<body><main class="page"><h1>四、毛利率与产品结构</h1><p>个人毛利率*%，主要受到产品价格下降以及低毛利产品占比增加影响。</p><table class="chapter4-table"><tr><th>指标</th><th>详情</th></tr><tr><td>价格变动</td><td><strong>均价上升：</strong> 暂无明显均价上升产品<br><br><strong>均价下降：</strong> 水包水0.02元/KG（同比↓0.02元/KG）</td></tr><tr><td>结构变化</td><td><strong>内墙乳胶漆面漆收入占比25.5%（占比下降25.5%）</strong><br><br><strong>内墙腻子收入占比17.8%（占比下降17.8%）</strong><br><br><strong>外墙腻子收入占比15.0%（占比下降15.0%）</strong></td></tr></table><h2>行动指南：</h2><p class="guide">◇ <strong>产品结构：</strong> 重点稳住内墙乳胶漆面漆、内墙腻子和外墙腻子的收入占比，防止其持续下滑。</p><p class="guide">◇ <strong>价格：</strong> 优先稳定水包水产品的均价，避免其价格进一步下降影响收入。</p></main></body>
