<body><main class="page"><h1>六、费用分析</h1><h3>差旅费</h3><p>6月差旅费8500元，同比增长37.1%。其中交通费增长800元、住宿费增长600元、车辆费增长500元、其他下降200元。</p><p>出差效率：6月出差天数12天，平均每天花费708元，其中交通费267元、住宿费233元、车辆费150元、其他58元。</p><h3>样板样漆费用</h3><p>6月费用4500元，同比增长1300元。其中真石漆相关费用1800元、内墙乳胶漆面漆相关费用1500元、外墙腻子相关费用800元。</p><h3>行动指南：</h3><p class="guide">◇ 本月差旅费增长，建议警惕出差效率与出差质量，提升出差产出比。</p><p class="guide">◇ 样板样漆费用增加但对应产品收入下滑，需要控制样板样漆费用。</p></main></body>
